<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Knowing How Logics</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js" defer></script>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <p class="page-title">Knowing How Logics</p>
            <a href="https://github.com/rensdoodeman/haskell-knowing-how-logics" target="_blank">&lt;&gt; Github</a>
        </div>
    </div>

    <div class="container">
        <div class="container-header">
            <h2>Formula Parser</h2>
            <div class="agent-toggle">
                <div>Single Agent</div>
                <div>Multi Agent</div>
            </div>
        </div>
        <div class="syntax"></div>
        <textarea placeholder="e.g., KH P12 (P12 & P3 -> P5)"></textarea>
        <button class="main-btn">Parse to Haskell Formula</button>
        <hr>
        <label>Parsed Haskell Formula</label>
        <div class="output">
        </div>
    </div>

</body>

</html>
