name: KHora
version: 1.0.0.0
synopsis: A model checker for knowing-how logics
description: See tex/KHora.pdf
maintainer: Ziqi Wang ziqi.wang6@student.uva.nl
category: Logic
spec-version: 0.36.0

ghc-options: -Wall

dependencies:
  - QuickCheck
  - base
  - containers
  - directory
  - lens
  - mtl
  - parsec
  - random
  - template-haskell

library:
  source-dirs: lib

executables:

  khora-bench:
    main: Main.hs
    source-dirs:
      - benchmarks/app
      - benchmarks/src
    dependencies:
      - KHora
      - filepath
    ghc-options:
      - -O2

  khora-check-basic:
    main: CheckBasic.hs
    source-dirs:
      - benchmarks/Check
    other-modules: []
    dependencies:
      - base

  khora-check-regular:
    main: CheckRegular.hs
    source-dirs:
      - benchmarks/Check
    other-modules: []
    dependencies:
      - base

  khora-check-intermediate:
    main: CheckIntermediate.hs
    source-dirs:
      - benchmarks/Check
    other-modules: []
    dependencies:
      - base

  khora-check-budget:
    main: CheckBudget.hs
    source-dirs:
      - benchmarks/Check
    other-modules: []
    dependencies:
      - base
      
  khora-check-all:
    main: CheckAll.hs
    source-dirs:
      - benchmarks/Check
    other-modules: []
    dependencies:
      - base
      