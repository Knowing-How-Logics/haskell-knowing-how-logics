name: KHora
version: 0.1.0.0
synopsis: A model checker for knowing-how logics
description: See haskell-knowing-how-logics.pdf
maintainer: Ziqi Wang ziqi.wang6@student.uva.nl
category: Logic
spec-version: 0.36.0

ghc-options: -Wall

dependencies:
  - QuickCheck
  - base
  - containers
  - directory
  - lens
  - mtl
  - parsec
  - random
  - template-haskell
  - scotty
  - text
  - wai-middleware-static

library:
  source-dirs: lib

executables:
  myprogram:
    main: Main.lhs
    source-dirs: exec
    dependencies:
      - KHora

tests:
  quickcheck-logic:     
    main:                quickcheck.lhs
    source-dirs:         test
    dependencies:
      - KHora
      - hspec
      - QuickCheck